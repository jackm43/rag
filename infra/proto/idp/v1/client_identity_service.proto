syntax = "proto3";

package idp.v1;

message ClientIdentity {
  string instance_id = 1;
  string application = 2;
  string subject = 3;
  string email = 4;
  string kind = 5;
  string jkt = 6;
  int64 created_at = 7;
  int64 expires_at = 8;
}

message RegisterClientIdentityRequest {
  string application = 1;
  string instance_id = 2;
  string public_jwk = 3;
  string kind = 4;
}

message RegisterClientIdentityResponse {
  string identity_token = 1;
  int64 expires_in = 2;
  ClientIdentity identity = 3;
}

message ListClientIdentitiesRequest {
  string application = 1;
}

message ListClientIdentitiesResponse {
  repeated ClientIdentity identities = 1;
}

service ClientIdentityService {
  rpc RegisterClientIdentity(RegisterClientIdentityRequest) returns (RegisterClientIdentityResponse);
  rpc ListClientIdentities(ListClientIdentitiesRequest) returns (ListClientIdentitiesResponse);
}
