syntax = "proto3";

package oauth.v1;

// RFC 6749 section 5.1.
message TokenResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
  string refresh_token = 4;
  string scope = 5;
}

// RFC 8693 section 2.1. Fields 8-9 are platform extensions for impersonation consent.
message TokenExchangeRequest {
  string subject_token = 1;
  string subject_token_type = 2;
  string actor_token = 3;
  string actor_token_type = 4;
  string audience = 5;
  repeated string scopes = 6;
  string requested_token_type = 7;
  string impersonation_token = 8;
  string impersonation_token_type = 9;
}

// RFC 8693 section 2.2. Field 5 carries granted scopes as a list for Connect callers.
message TokenExchangeResponse {
  string access_token = 1;
  string issued_token_type = 2;
  string token_type = 3;
  int64 expires_in = 4;
  repeated string scopes = 5;
}
