syntax = "proto3";

package oauth.v1;

// RFC 8414 authorization server metadata (subset surfaced in gateway discovery).
message AuthorizationServerMetadata {
  string issuer = 1;
  string authorization_endpoint = 2;
  string token_endpoint = 3;
  string jwks_uri = 4;
  string client_id = 5;
}

// RFC 7636 authorization code exchange parameters.
message AuthorizationCodeExchange {
  string authorization_code = 1;
  string code_verifier = 2;
  string redirect_uri = 3;
}
