syntax = "proto3";

package ragbot.v1;

import "google/protobuf/struct.proto";

message ConfigEntry {
  string key = 1;
  string value = 2;
  string default_value = 3;
  bool overridden = 4;
}

message ListConfigRequest {}

message ListConfigResponse {
  repeated ConfigEntry entries = 1;
}

message GetConfigRequest {
  string key = 1;
}

message GetConfigResponse {
  ConfigEntry entry = 1;
}

message UpdateConfigRequest {
  string key = 1;
  string value = 2;
}

message UpdateConfigResponse {
  ConfigEntry entry = 1;
}

message ResetConfigRequest {
  string key = 1;
}

message ResetConfigResponse {
  ConfigEntry entry = 1;
}

service ConfigService {
  rpc ListConfig(ListConfigRequest) returns (ListConfigResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc ResetConfig(ResetConfigRequest) returns (ResetConfigResponse);
}

message QueryRequest {
  string sql = 1;
  repeated google.protobuf.Value params = 2;
}

message QueryResponse {
  repeated google.protobuf.Struct rows = 1;
  google.protobuf.Struct meta = 2;
}

service DatabaseService {
  rpc Query(QueryRequest) returns (QueryResponse);
}

message Interaction {
  int64 id = 1;
  string kind = 2;
  string channel_id = 3;
  string requester_username = 4;
  string prompt = 5;
  string response_text = 6;
  string model = 7;
  int64 ai_duration_ms = 8;
  int64 total_duration_ms = 9;
  string status = 10;
  string error_message = 11;
  string created_at = 12;
}

message ListInteractionsRequest {
  int32 limit = 1;
}

message ListInteractionsResponse {
  repeated Interaction interactions = 1;
}

service InteractionService {
  rpc ListInteractions(ListInteractionsRequest) returns (ListInteractionsResponse);
}

message ChatRequest {
  string prompt = 1;
  string channel_id = 2;
  string message_id = 3;
  string reply_context = 4;
  string requester_username = 5;
  bool post_to_channel = 6;
}

message ChatResponse {
  string response_text = 1;
  string model = 2;
  int64 ai_duration_ms = 3;
  int64 total_duration_ms = 4;
}

message ChatStreamChunk {
  string delta = 1;
  bool done = 2;
  string response_text = 3;
  string model = 4;
  int64 ai_duration_ms = 5;
  int64 total_duration_ms = 6;
}

service ChatService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc StreamChat(ChatRequest) returns (stream ChatStreamChunk);
}

message RagTotal {
  string user_id = 1;
  string username = 2;
  int64 rag_count = 3;
  string updated_at = 4;
}

message ListTotalsRequest {
  int32 limit = 1;
}

message ListTotalsResponse {
  repeated RagTotal totals = 1;
}

service LeaderboardService {
  rpc ListTotals(ListTotalsRequest) returns (ListTotalsResponse);
}

message GetHealthRequest {}

message GetHealthResponse {
  google.protobuf.Struct state = 1;
}

message StartGatewayRequest {}

message StartGatewayResponse {
  google.protobuf.Struct state = 1;
}

service GatewayControlService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
  rpc StartGateway(StartGatewayRequest) returns (StartGatewayResponse);
}
