syntax = "proto3";

package ragbot.v1;

message ChatRequest {
  string prompt = 1;
  string channel_id = 2;
  string message_id = 3;
  string reply_context = 4;
  string requester_username = 5;
  bool post_to_channel = 6;
}

message ChatResponse {
  string response_text = 1;
  string model = 2;
  int64 ai_duration_ms = 3;
  int64 total_duration_ms = 4;
}

message ChatStreamChunk {
  string delta = 1;
  bool done = 2;
  string response_text = 3;
  string model = 4;
  int64 ai_duration_ms = 5;
  int64 total_duration_ms = 6;
}

service ChatService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc StreamChat(ChatRequest) returns (stream ChatStreamChunk);
}
