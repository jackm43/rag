applications:
  idp:
    description: "Authentication gateway: identity, token exchange, registry, discovery"
    endpoint: https://auth-gateway.jsmunro.me
    worker: auth-gateway
    config: infra/applications/idp/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    internal: true
    # Generated worker-to-worker client: applications call gateway services
    # (client identity registration, tracing) through typed factories.
    service_client: true
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  ragbot:
    description: Discord bot admin services
    endpoint: https://ragbot.jsmunro.me
    worker: ragbot-worker
    config: infra/applications/ragbot/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    service_client: true
    secrets:
      DISCORD_APPLICATION_ID: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/ApplicationId
      DISCORD_PUBLIC_KEY: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/PublicKey
      DISCORD_BOT_TOKEN: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/bot_token
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
    delegations:
      - audience: idp
      - audience: deploy
        scopes:
          - deploy/DeployService.ListWorkers
      - audience: aigateway
    post_deploy:
      - gateway-start
  aigateway:
    description: AI Gateway proxy with unified billing and injected gateway auth token
    endpoint: https://aigateway.jsmunro.me
    worker: aigateway
    config: infra/applications/aigateway/worker/wrangler.jsonc
    provider: cloudflare
    # The upstream AI Gateway only supports a static credential: the secret
    # below is delivered as a worker secret and injected on outbound calls.
    provider_auth: api_token
    secret_provider: 1password
    trust_zone: tier2
    # aigateway is only ever a target of impersonation, never the actor, so it
    # needs no Cloudflare Access app of its own.
    impersonatable: false
    # Self-delegation: the worker chains browser session tokens into its own
    # audience (backend-for-frontend exchange), acting as itself.
    # The ragbot delegation backs the chat's ragbot connector (MCP-style
    # tools): the caller's identity is chained on to ragbot, scoped to
    # exactly the RPCs the tools use.
    delegations:
      - audience: aigateway
      - audience: ragbot
        scopes:
          - ragbot/LeaderboardService.ListTotals
    # Generate a typed browser client (infra/applications/aigateway/web) for
    # pages built on the trust zone web auth SDK, and a service client
    # (infra/applications/aigateway/service) for worker-to-worker hops.
    web_client: true
    service_client: true
    secrets:
      CF_AIG_TOKEN: op://Services/Cloudflare User API Token/password
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  chat:
    description: Browser chat web client (confidential BFF) fronting the AI Gateway
    endpoint: https://chat.jsmunro.me
    worker: chat
    config: infra/applications/chat/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    # The web application is the registered principal for its pages: a
    # client-only application (no proto/RPC surface) whose worker holds the
    # service credential and runs the confidential flow on the browser's
    # behalf — it validates the DPoP-bound session at its edge, chains the
    # user's identity per target audience, and injects the token on the
    # forwarded request. Targets always re-validate.
    impersonatable: false
    # aigateway powers the chat; the ragbot delegation backs the data panel
    # (read-only RPCs surfaced next to the chat window).
    delegations:
      - audience: aigateway
      - audience: ragbot
        scopes:
          - ragbot/LeaderboardService.ListTotals
          - ragbot/ConfigService.ListConfig
          - ragbot/InteractionService.ListInteractions
          - ragbot/GatewayControlService.GetHealth
      # Chat instances federate with the platform IdP: the BFF registers
      # each instance (acting for the user) and receives a gateway-signed,
      # key-bound identity document.
      - audience: idp
        scopes:
          - idp/ClientIdentityService.RegisterClientIdentity
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  console:
    description: Platform management web console (confidential BFF) over registry, deploys, config, and traces
    endpoint: https://console.jsmunro.me
    worker: console
    config: infra/applications/console/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    # Client-only application like chat: no proto/RPC surface of its own. The
    # worker holds the service credential and runs the confidential flow on
    # the browser's behalf - it validates the DPoP-bound session at its edge,
    # chains the user's identity per target audience, and injects the token
    # on the forwarded request. Targets always re-validate.
    impersonatable: false
    delegations:
      # Registry management, trace views, and gateway discovery reads; the
      # ClientIdentityService scope backs instance registration (the live
      # trace follower runs under its own registered identity).
      - audience: idp
        scopes:
          - idp/RegistryService.RegisterApplication
          - idp/RegistryService.GetApplication
          - idp/RegistryService.ListApplications
          - idp/RegistryService.DeleteApplication
          - idp/TraceService.ListTraces
          - idp/TraceService.GetTrace
          - idp/TraceService.StreamTraces
          - idp/DiscoveryService.Discover
          - idp/ClientIdentityService.RegisterClientIdentity
      - audience: deploy
        scopes:
          - deploy/DeployService.ListWorkers
          - deploy/DeployService.DeployWorker
      - audience: discovery
        scopes:
          - discovery/DiscoveryService.Query
          - discovery/DiscoveryService.Sync
      - audience: ragbot
        scopes:
          - ragbot/ConfigService.ListConfig
          - ragbot/ConfigService.GetConfig
          - ragbot/ConfigService.UpdateConfig
          - ragbot/ConfigService.ResetConfig
          - ragbot/GatewayControlService.GetHealth
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  discovery:
    description: Platform discovery read model; GraphQL queries over the gateway registry
    endpoint: https://discovery.jsmunro.me
    worker: discovery
    config: infra/applications/discovery/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    service_client: true
    web_client: true
    # Ingestion: the worker re-reads the gateway registry through the
    # standard connector, so the delegation is scoped to exactly that RPC.
    delegations:
      - audience: idp
        scopes:
          - idp/DiscoveryService.Discover
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  deploy:
    description: Worker deployment service; chains to the cloudflare application for provider API access
    endpoint: https://deploy.jsmunro.me
    worker: deploy
    config: infra/applications/deploy/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    service_client: true
    delegations:
      - audience: cloudflare
        scopes:
          - cloudflare/WorkerService.DeployWorker
          - cloudflare/WorkerService.ListWorkers
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  cloudflare:
    description: Cloudflare API proxy using delegated OAuth tokens
    endpoint: https://cloudflare.jsmunro.me
    worker: cloudflare
    config: infra/applications/cloudflare/worker/wrangler.jsonc
    provider: cloudflare
    secret_provider: 1password
    impersonatable: false
    trust_zone: tier2
    service_client: true
    # User-delegated provider OAuth: registration provisions a confidential
    # OAuth client scoped to exactly these provider API scopes, and the
    # gateway exchanges each caller's identity for short-lived tokens.
    provider_auth: oauth
    provider_api_scopes:
      - teams-connector-warp.read
      - teams-connector-warp.write
      - teams.read
      - teams.write
      - teams-pii.read
      - workers-scripts.read
      - workers-scripts.write
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
