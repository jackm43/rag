applications:
  idp:
    description: "Authentication gateway: identity, token exchange, registry, discovery"
    endpoint: https://auth-gateway.jsmunro.workers.dev
    worker: auth-gateway
    config: infra/gateway/wrangler.jsonc
    language: typescript
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    internal: true
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
  ragbot:
    description: Discord bot admin services
    endpoint: https://ragbot-worker.jsmunro.workers.dev
    worker: ragbot-worker
    config: wrangler.jsonc
    language: typescript
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    secrets:
      DISCORD_APPLICATION_ID: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/ApplicationId
      DISCORD_PUBLIC_KEY: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/PublicKey
      DISCORD_BOT_TOKEN: op://mqrwrig24fxs3ssywmf3pxwqgy/ragbot/bot_token
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
    delegations:
      - audience: idp
      - audience: deploy
    webhooks:
      - name: discord
        type: ed25519
    post_deploy:
      - gateway-start
  deploy:
    description: Worker deployment service using delegated Cloudflare tokens
    endpoint: https://deploy.jsmunro.workers.dev
    worker: deploy
    config: infra/deploy/wrangler.jsonc
    language: typescript
    provider: cloudflare
    secret_provider: 1password
    trust_zone: tier2
    access:
      allowed_groups: [admins]
      allowed_idps: [github]
